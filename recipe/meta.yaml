{% set name = "tensorflow-datasets" %}
{% set version = "4.9.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/tensorflow/datasets/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 918b74f142151a445f90bc72605e7d6837aed241b0759fe55e32ede11b6126ac

build:
  number: 0
  noarch: python
  entry_points:
    - tfds = tensorflow_datasets.scripts.cli.main:launch_cli
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - absl-py >=1
    # - array_record >=0.5.0  # [linux]
    - click
    - dm-tree
    - etils >=1.9.1
    - typing_extensions
    - fsspec
    - importlib_resources
    - zipp
    - immutabledict
    - numpy
    - promise
    - protobuf >=3.20
    - psutil
    - pyarrow
    - requests >=2.19.0
    - simple-parsing
    - tensorflow-metadata
    - termcolor
    - toml
    - tqdm
    - wrapt
  run_constrained:
    - tensorflow >=2.1

test:
  imports:
    - tensorflow_datasets
    - tensorflow_datasets.audio
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - dill
    - jax ==0.4.28
    - jupyter
    - pytest
    - pytest-shard
    - pytest-xdist
    - apache-beam
    - conllu
    - mlcroissant >=1.0.9
    - pandas
    - pydub
    - pyyaml

about:
  home: https://pypi.org/project/tensorflow-datasets/
  summary: TensorFlow Datasets is a collection of datasets ready to use, with TensorFlow or other Python ML frameworks, such as Jax.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/tensorflow/datasets
  doc_url: https://www.tensorflow.org/datasets/overview

extra:
  recipe-maintainers:
    - JennaLipscomb
    - mxr-conda
    - ngam
    - ehfd
