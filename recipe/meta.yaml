{% set name = "tensorflow-datasets" %}
{% set version = "4.9.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tensorflow-datasets-{{ version }}.tar.gz
  sha256: 90390077dde2c9e4e240754ddfc5bb50b482946d421c8a34677c3afdb0463427

build:
  number: 0
  noarch: python
  entry_points:
    - tfds = tensorflow_datasets.scripts.cli.main:launch_cli
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    # Remove when updated from v4.9.3: https://github.com/tensorflow/datasets/commit/3f27a2c222d5490be6e04ce127152e15af5becb1
    - sed -i 's/^Requires-Dist: array_record.*/Requires-Dist: array_record>=0.5.0; platform_system == "Linux"/' ${SP_DIR}/tensorflow_datasets-${PKG_VERSION}.dist-info/METADATA

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - absl-py >=1
    # - array_record >=0.5.0  # [linux]
    - click
    - dm-tree
    - etils >=0.9.0
    - typing_extensions
    - fsspec
    - importlib_resources
    - zipp
    - immutabledict
    - numpy
    - promise
    - protobuf >=3.20
    - psutil
    - pyarrow
    - requests >=2.19.0
    - simple-parsing
    - tensorflow-metadata
    - termcolor
    - toml
    - tqdm
    - wrapt
  run_constrained:
    - tensorflow >=2.1

test:
  imports:
    - tensorflow_datasets
    - tensorflow_datasets.audio
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pypi.org/project/tensorflow-datasets/
  summary: TensorFlow Datasets is a collection of datasets ready to use, with TensorFlow or other Python ML frameworks, such as Jax.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/tensorflow/datasets
  doc_url: https://www.tensorflow.org/datasets/overview

extra:
  recipe-maintainers:
    - JennaLipscomb
    - mxr-conda
    - ngam
    - ehfd
