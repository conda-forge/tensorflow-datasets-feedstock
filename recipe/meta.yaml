{% set name = "tensorflow-datasets" %}
{% set version = "4.9.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tensorflow-datasets-{{ version }}.tar.gz
  sha256: 9cb245cad97e7d227f0b8e006491cfef860ff8d4b9d84a3c68f8b96d6295355e

build:
  number: 0
  noarch: python
  entry_points:
    - tfds = tensorflow_datasets.scripts.cli.main:launch_cli
  script: |
    ${PYTHON} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - absl-py >=1
    - click
    - dm-tree
    - etils >=0.9.0
    - typing_extensions
    - fsspec
    - importlib_resources
    - zipp
    - immutabledict
    - numpy
    - promise
    - protobuf >=3.20
    - psutil
    - pyarrow
    - requests >=2.19.0
    - simple-parsing
    - tensorflow-metadata
    - termcolor
    - toml
    - tqdm
    - wrapt
  run_constrained:
    - tensorflow >=2.1
    - array-record >=0.5.0

test:
  imports:
    - tensorflow_datasets
    - tensorflow_datasets.audio
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pypi.org/project/tensorflow-datasets/
  summary: TensorFlow Datasets is a collection of datasets ready to use, with TensorFlow or other Python ML frameworks, such as Jax.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/tensorflow/datasets
  doc_url: https://www.tensorflow.org/datasets/overview

extra:
  recipe-maintainers:
    - JennaLipscomb
    - mxr-conda
    - ngam
    - ehfd
